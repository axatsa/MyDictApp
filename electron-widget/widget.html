<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDict Widget</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Space Grotesk', sans-serif;
      height: 100%;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
      transition: background-color 0.5s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    #word-area {
      text-align: center;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      padding: 2rem;
      max-width: 90vw;
    }

    #word-main {
      font-size: clamp(2rem, 10vw, 7rem);
      font-weight: 800;
      color: rgba(0,0,0,0.78);
      letter-spacing: -0.03em;
      line-height: 1;
      margin: 0 0 0.35rem;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    #word-transcription {
      font-size: clamp(0.85rem, 2vw, 1.2rem);
      font-weight: 400;
      color: rgba(0,0,0,0.38);
      letter-spacing: 0.02em;
      margin: 0 0 0.85rem;
      font-style: italic;
      min-height: 1.4em;
    }

    #word-subs {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .sub-word {
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      font-weight: 700;
      color: rgba(0,0,0,0.5);
    }

    .sub-sep {
      color: rgba(0,0,0,0.2);
      font-weight: 400;
    }

    #word-def {
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      color: rgba(0,0,0,0.42);
      font-style: italic;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.5;
      min-height: 2.5rem;
    }

    #topbar {
      position: fixed;
      top: 1rem;
      left: 1rem;
      right: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
    }

    .topbtn {
      background: rgba(0,0,0,0.1);
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 0.4rem 0.85rem;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: inherit;
      color: rgba(0,0,0,0.7);
      transition: background 0.2s;
    }

    .topbtn:hover {
      background: rgba(0,0,0,0.18);
    }

    .lang-selector {
      display: flex;
      gap: 0.3rem;
    }

    .lang-btn {
      padding: 0.35rem 0.6rem;
      border-radius: 0.4rem;
      border: 2px solid rgba(0,0,0,0.15);
      font-size: 0.7rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      background: rgba(255,255,255,0.7);
      color: rgba(0,0,0,0.6);
    }

    .lang-btn.active {
      background: rgba(0,0,0,0.85);
      color: white;
      border-color: rgba(0,0,0,0.85);
    }

    .lang-btn:not(.active):hover {
      border-color: rgba(0,0,0,0.3);
    }

    #tap-hint {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      pointer-events: none;
    }

    .error {
      color: #e74c3c;
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 767px) {
      #app {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div class="lang-selector">
      <button class="lang-btn active" id="lang-en" onclick="setPrimary('en')">EN</button>
      <button class="lang-btn" id="lang-uz" onclick="setPrimary('uz')">UZ</button>
      <button class="lang-btn" id="lang-kr" onclick="setPrimary('kr')">KR</button>
    </div>
    <span id="word-counter" style="font-size: 0.78rem; font-weight: 700; color: rgba(0,0,0,0.35);"></span>
  </div>

  <div id="word-area">
    <div id="word-main">...</div>
    <div id="word-transcription"></div>
    <div id="word-subs">
      <span class="sub-word" id="sub-a"></span>
      <span class="sub-sep">·</span>
      <span class="sub-word" id="sub-b"></span>
    </div>
    <p id="word-def"></p>
  </div>

  <div id="tap-hint">tap on word to continue</div>
</div>

<script src="widget.js"></script>
</body>
</html>
